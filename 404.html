<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Timeless</title>
    <meta name="description" content="This page doesn't exist. Head back to the Timeless homepage." />
    <link rel="icon" type="image/jpeg" href="wordmark-dark.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --black: #050505;
            --white: #ffffff;
            --off-white: #f5f5f0;
            --muted: #a3a3a3;
            --muted-2: #737373;
            --border: #262626;
            --border-light: #3a3a3a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            width: min(100% - 40px, 1180px);
            margin-inline: auto;
        }

        /* ── Nav ── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(5, 5, 5, 0.78);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            height: 78px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand-mark {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.26em;
            text-transform: uppercase;
        }

        .nav-link {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--off-white);
            border-bottom: 1px solid currentColor;
            padding-bottom: 4px;
        }

        /* ── 404 Content ── */
        .error-section {
            flex: 1;
            display: grid;
            align-items: center;
            padding: 72px 0;
        }

        .error-content {
            text-align: center;
        }

        .error-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .error-eyebrow::before,
        .error-eyebrow::after {
            content: "";
            width: 32px;
            height: 1px;
            background: var(--muted-2);
        }

        .error-code {
            font-size: clamp(120px, 22vw, 280px);
            line-height: 0.82;
            font-weight: 900;
            letter-spacing: -0.08em;
            text-transform: uppercase;
            color: var(--white);
            opacity: 0;
            transform: translateY(18px);
            animation: reveal 760ms cubic-bezier(.2, .7, .2, 1) 120ms forwards;
        }

        .error-message {
            margin-top: 28px;
            font-size: clamp(20px, 3vw, 32px);
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--off-white);
            opacity: 0;
            transform: translateY(18px);
            animation: reveal 760ms cubic-bezier(.2, .7, .2, 1) 240ms forwards;
        }

        .error-body {
            margin-top: 16px;
            color: var(--muted);
            font-size: 17px;
            max-width: 460px;
            margin-inline: auto;
            opacity: 0;
            transform: translateY(18px);
            animation: reveal 760ms cubic-bezier(.2, .7, .2, 1) 340ms forwards;
        }

        .error-actions {
            margin-top: 36px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            opacity: 0;
            transform: translateY(18px);
            animation: reveal 760ms cubic-bezier(.2, .7, .2, 1) 440ms forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 0 30px;
            border: 1px solid var(--white);
            background: var(--white);
            color: var(--black);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: transparent;
            color: var(--white);
        }

        .btn-outline {
            background: transparent;
            color: var(--white);
            border-color: var(--border-light);
        }

        .btn-outline:hover {
            background: var(--white);
            color: var(--black);
            border-color: var(--white);
        }

        /* ── Footer ── */
        .footer {
            padding: 54px 0;
            border-top: 1px solid var(--border);
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
        }

        .footer-brand {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .footer-copy {
            color: var(--muted);
            font-size: 13px;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 920px) {
            .container {
                width: min(100% - 32px, 1180px);
            }

            .nav-inner {
                height: 68px;
            }
        }

        @media (max-width: 560px) {
            .container {
                width: min(100% - 24px, 1180px);
            }

            .nav-inner {
                height: 60px;
            }

            .brand-mark {
                font-size: 12px;
            }

            .nav-link {
                font-size: 11px;
            }

            .error-section {
                padding: 48px 0;
            }

            .error-eyebrow {
                font-size: 11px;
                margin-bottom: 20px;
            }

            .error-message {
                font-size: 20px;
                margin-top: 20px;
            }

            .error-body {
                font-size: 15px;
            }

            .error-actions {
                margin-top: 28px;
            }

            .btn {
                min-height: 50px;
                font-size: 11px;
                padding: 0 22px;
            }

            .footer {
                padding: 40px 0;
            }

            .footer-inner {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <nav class="nav" aria-label="Main navigation">
            <div class="container nav-inner">
                <a href="/" class="brand-mark">Timeless</a>
                <a href="/#waitlist" class="nav-link">Join Waitlist</a>
            </div>
        </nav>

        <main>
            <section class="error-section">
                <div class="container error-content">
                    <div class="error-eyebrow">Page not found</div>
                    <h1 class="error-code">404</h1>
                    <p class="error-message">This page doesn't exist.</p>
                    <p class="error-body">The page you're looking for may have been moved or no longer exists. Head back to where it all starts.</p>
                    <div class="error-actions">
                        <a class="btn" href="/">Back to Home</a>
                        <a class="btn btn-outline" href="/#waitlist">Join the Waitlist</a>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container footer-inner">
                <span class="footer-brand">Timeless</span>
                <span class="footer-copy">© 2026 Timeless. All rights reserved.</span>
            </div>
        </footer>
    </div>
</body>

</html>
